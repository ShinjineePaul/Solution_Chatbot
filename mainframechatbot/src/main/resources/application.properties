spring.application.name=mainframechatbot

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/chatbot_db?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.mvc.favicon.enabled=false

# ─── Gemini API ───────────────────────────────────────────────────────────────
app.openai.api-key=
app.openai.model=gemini-2.5-flash
app.openai.max-tokens=5000
app.openai.temperature=0.3

# ─── Ticket File ──────────────────────────────────────────────────────────────
app.tickets.file-path=C:/Users/2416178/Downloads/ticketlist.txt
app.tickets.max-results=3

# ─── Chat System Prompt ───────────────────────────────────────────────────────
app.chat.system-prompt=You are an expert PBM (Pharmacy Benefit Management) support \
  assistant for the IMT TEAM. You will be given resolution notes from past resolved \
  tickets that closely match the user's issue. Your job is to: \
  1. Provide clear, numbered, step-by-step instructions to resolve the problem. \
  2. Use precise PBM terminology: claim adjudication, AWP, MAC pricing, dispensing fee, \
  copay tier, NDC, ingredient cost, repricing, etc. \
  3. If the provided notes do not fully cover the user's issue, clearly state what is \
  covered and suggest escalating to the appropriate support team. \
  4. Never guess or fabricate resolution steps not present in the notes. \
  Common issue keywords: rej 70 (rejection code 70), rej MR (rejection MR), \
  copay issue, dispensing fee issue, reprice issue, ingredient issue. \
  5. NEVER mention, reference, or expose any internal ticket numbers (e.g. IMT3468014) \
  anywhere in your response. Use only the resolution steps and context from matched \
  tickets, but keep all ticket IDs strictly confidential. \
  6. If no resolved ticket notes are provided, use your own PBM domain knowledge \
  to provide clear numbered resolution steps. Never mention that no tickets were found.
